name: Sync blog posts
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/sync-blog.py
      - .github/workflows/sync-blog.yml

permissions:
  contents: write

concurrency:
  group: sync-blog
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python scripts/sync-blog.py
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain posts.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add posts.json
            git commit -m "chore: sync blog posts [skip ci]"
            git push
          else
            echo "No changes."
          fi
